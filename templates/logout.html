<!DOCTYPE html>
<html>

<head>
    <title>Logout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff5f6d, #ffc371);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }
        
        .message {
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="message">
        <h2>Logging out...</h2>
        <p>You will be redirected to the login page shortly.</p>
    </div>

    <script>
        // Simulate session destroy
        localStorage.removeItem("loggedIn"); // if using JS demo login
        localStorage.removeItem("admin"); // optional for admin demo

        // Redirect to login page after 2 seconds
        setTimeout(function() {
            window.location.href = "login.html"; // change to your login page
        }, 2000);
    </script>

</body>

</html>
