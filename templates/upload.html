<!DOCTYPE html>
<html>

<head>
    <title>Upload Item</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            margin: 0;
            padding: 0;
        }
        
        .container {
            width: 400px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        h2 {
            text-align: center;
        }
        
        input,
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        
        textarea {
            height: 80px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 6px;
            background-color: #28a745;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #1e7e34;
        }
        
        .success {
            color: green;
            text-align: center;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>


          <div class="nav">
            
            <a href="{{ url_for('register') }}">register</a>
            <a href="{{ url_for('login') }}">User Login</a>
            <a href="{{ url_for('report') }}">report item</a>
            <a href="{{ url_for('login') }}">Admin login</a>
            
       </div>

    <div class="container">

        <h2>Submit Item</h2>

        <form onsubmit="submitForm(event)">

            <input type="text" placeholder="Item Name" required>

            <textarea placeholder="Description"></textarea>

            <input type="text" placeholder="Location">

            <select>
    <option>Lost</option>
    <option>Found</option>
</select>

            <input type="file" required>

            <button type="submit">Submit</button>

        </form>

        <p class="success" id="msg">Item uploaded successfully! (Demo only)</p>

    </div>

    <script>
        function submitForm(e) {
            e.preventDefault();
            document.getElementById("msg").style.display = "block";
        }
    </script>

</body>

</html>
