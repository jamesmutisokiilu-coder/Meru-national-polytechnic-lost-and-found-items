<!DOCTYPE html>
<html>

<head>
    <title>Database Connection Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            color: white;
            text-align: center;
            padding-top: 100px;
        }
        
        .message {
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <div class="message" id="msg">Connecting to database...</div>

    <script>
        // Simulate database connection
        setTimeout(function() {
            const msg = document.getElementById("msg");
            const success = true; // change to false to simulate failure

            if (success) {
                msg.textContent = "Connection successful! (Demo only)";
                msg.style.background = "rgba(0,128,0,0.6)";
            } else {
                msg.textContent = "Connection failed! (Demo only)";
                msg.style.background = "rgba(255,0,0,0.6)";
            }
        }, 1000);
    </script>

</body>

</html>
