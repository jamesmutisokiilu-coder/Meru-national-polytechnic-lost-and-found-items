<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Search Lost Items</title>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #42a5f5;
    margin: 0;
    padding: 0;
}

.nav {
    background-color: #6f4e37;
    padding: 15px;
    text-align: center;
}

.nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: 600;
}

.search-container {
    background: white;
    width: 90%;
    max-width: 900px;
    margin: 30px auto;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
}

input, select {
    padding: 12px;
    width: 40%;
    margin: 5px;
    border-radius: 8px;
}

button {
    padding: 12px 20px;
    background: #6f4e37;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 25px;
}

.card {
    background: white;
    width: 260px;
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 8px;
}

.status {
    padding: 5px 10px;
    color: white;
    border-radius: 5px;
}

.lost { background: red; }
.found { background: green; }

.no-results {
    margin-top: 20px;
    color: white;
}
</style>

</head>

<body>

<div class="nav">
    <a href="{{ url_for('report') }}">Report Item</a>
    <a href="{{ url_for('search') }}">Search</a>
    <a href="{{ url_for('logout') }}">Logout</a>
</div>

<div class="search-container">

<h2>🔍 Search Items</h2>

<form method="GET" action="{{ url_for('search') }}">
    <input type="text" name="search" placeholder="Search item..." value="{{ query or '' }}">
    
    <select name="status">
        <option value="">All</option>
        <option value="Lost">Lost</option>
        <option value="Found">Found</option>
    </select>

    <button type="submit">Search</button>
</form>

<div class="container">

{% if results %}
    {% for item in results %}
        <div class="card">
            {% if item.image %}
                <img src="{{ url_for('static', filename='uploads/' + item.image) }}">
            {% endif %}

            <h3>{{ item.item_name }}</h3>
            <p>{{ item.description }}</p>
            <p><b>Location:</b> {{ item.location_found }}</p>

            <span class="status {% if item.status == 'Lost' %}lost{% else %}found{% endif %}">
                {{ item.status }}
            </span>
        </div>
    {% endfor %}
{% else %}
    <div class="no-results">
        No items found.
    </div>
{% endif %}

</div>

</div>

</body>
</html>
